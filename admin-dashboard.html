<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন ড্যাশবোর্ড - নির্বিক হোমিও</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>

    <script>
        const style = document.createElement('style');
        style.innerHTML = 'body { display: none !important; }';
        document.head.appendChild(style);

        let isDashboardInitialized = false;

        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                firebase.firestore().collection("users").doc(user.uid).get()
                .then((doc) => {
                    if (doc.exists && doc.data().role === "admin") {
                        if (style.parentNode) {
                            style.remove();
                        }
                        console.log("Welcome Admin");
                        
                        if (!isDashboardInitialized) {
                            isDashboardInitialized = true;
                            loadDashboardData();
                        }
                    } else {
                        alert("আপনার এই পেজে প্রবেশের অনুমতি নেই!");
                        window.location.href = "dashboard.html"; 
                    }
                }).catch((error) => {
                    console.error("Error checking role: ", error);
                    window.location.href = "login.html";
                });
            }
        });
    </script>
    <style>
        body { 
            font-family: 'SolaimanLipi', system-ui, sans-serif; 
            background: #f4f7f6; 
            min-height: 100vh;
            color: #1e293b;
        }
        
        .dark-hero-section {
            background: #022c22;
            color: white;
            padding: 32px 16px;
            border-bottom: 4px solid #059669;
        }

        .stat-card {
            background: #022c22; 
            color: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            transition: all 0.3s;
            border: 1px solid #065f46;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        }
        
        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .table-container {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 12px 10px;
            background: #f8fafc;
            font-weight: 600;
            color: #0f172a;
            border-bottom: 2px solid #e2e8f0;
            font-size: 14px;
        }
        
        td {
            padding: 10px 10px;
            border-bottom: 1px solid #e2e8f0;
            color: #334155;
            font-size: 14px;
        }
        
        tr:hover {
            background: #f8fafc;
        }

        .table-input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 13px;
            background-color: #fff;
            color: #0f172a;
            transition: border-color 0.2s;
        }
        .table-input:focus {
            outline: none;
            border-color: #059669;
        }
        .readonly-input {
            background-color: #f1f5f9;
            color: #64748b;
            cursor: not-allowed;
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }
        
        .status-active { background: #dcfce7; color: #166534; }
        .status-inactive { background: #fee2e2; color: #991b1b; }
        .status-pending { background: #fef3c7; color: #92400e; }
        
        .btn-action {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            transition: all 0.2s;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-save { background: #059669; color: white; }
        .btn-save:hover { background: #047857; }
        .btn-delete { background: #ef4444; color: white; }
        .btn-delete:hover { background: #dc2626; }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="dark-hero-section">
        <div class="max-w-7xl mx-auto px-4">
            <div class="fade-in">
                <h1 class="text-3xl font-bold text-emerald-400">
                    <i class="fas fa-shield-alt mr-3"></i>অ্যাডমিন ড্যাশবোর্ড
                </h1>
                <p class="text-emerald-200 mt-1">ইউজার এক্সেস, পেমেন্ট ও মেয়াদ নিয়ন্ত্রণ করুন</p>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- স্ট্যাটিস্টিক্স কার্ডসমূহ -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="stat-card fade-in">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-emerald-200 text-sm">মোট ইউজার</p>
                        <p class="text-3xl font-bold" id="totalUsers">০</p>
                    </div>
                    <div class="stat-icon bg-emerald-900/50 text-emerald-400">
                        <i class="fas fa-users"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card fade-in">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-emerald-200 text-sm">পেইড ইউজার</p>
                        <p class="text-3xl font-bold" id="paidUsers">০</p>
                    </div>
                    <div class="stat-icon bg-emerald-900/50 text-yellow-400">
                        <i class="fas fa-crown"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card fade-in">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-emerald-200 text-sm">ফ্রি ইউজার</p>
                        <p class="text-3xl font-bold" id="freeUsers">০</p>
                    </div>
                    <div class="stat-icon bg-emerald-900/50 text-blue-400">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card fade-in">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-emerald-200 text-sm">মোট অর্ডার</p>
                        <p class="text-3xl font-bold" id="totalOrders">০</p>
                    </div>
                    <div class="stat-icon bg-emerald-900/50 text-purple-400">
                        <i class="fas fa-shopping-cart"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- চার্ট ও কুইক অ্যাকশন -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-2 table-container fade-in">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">
                    <i class="fas fa-chart-bar text-emerald-600 mr-2"></i>ইউজার গ্রোথ
                </h3>
                <canvas id="userGrowthChart" height="180"></canvas>
            </div>
            
            <div class="table-container fade-in">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">
                    <i class="fas fa-bolt text-emerald-600 mr-2"></i>কুইক অ্যাকশন
                </h3>
                <div class="space-y-3">
                    <button onclick="window.location.href='register.html'" class="w-full bg-emerald-600 text-white px-4 py-2.5 rounded-xl hover:bg-emerald-700 transition flex items-center justify-center gap-2 font-medium">
                        <i class="fas fa-user-plus"></i> নতুন ইউজার যোগ করুন
                    </button>
                    <button onclick="window.location.href='manage-users.html'" class="w-full bg-slate-700 text-white px-4 py-2.5 rounded-xl hover:bg-slate-800 transition flex items-center justify-center gap-2 font-medium">
                        <i class="fas fa-users-cog"></i> ইউজার ম্যানেজ
                    </button>
                    <button onclick="window.location.href='medica/index.html'" class="w-full bg-teal-700 text-white px-4 py-2.5 rounded-xl hover:bg-teal-800 transition flex items-center justify-center gap-2 font-medium">
                        <i class="fas fa-book-medical"></i> মেডিকা এডিট
                    </button>
                </div>
            </div>
        </div>

        <!-- ইউজার টেবিল -->
        <div class="table-container fade-in">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3">
                <h3 class="text-lg font-semibold text-gray-800">
                    <i class="fas fa-list text-emerald-600 mr-2"></i>ইউজার পেমেন্ট ও মেয়াদ লিস্ট
                </h3>
                <div class="flex gap-2 w-full sm:w-auto">
                    <input type="text" id="searchUser" placeholder="নাম বা ইমেইল দিয়ে সার্চ..." class="flex-1 sm:w-64 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-emerald-600 text-sm">
                    <button onclick="loadDashboardData()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-teal-700 transition text-sm">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="min-w-full">
                    <thead>
                        <tr>
                            <th style="width: 5%">#</th>
                            <th style="width: 17%">নাম ও ইমেইল</th>
                            <th style="width: 15%">ফোন নম্বর</th>
                            <th style="width: 12%">টাকার পরিমাণ</th>
                            <th style="width: 14%">শুরুর তারিখ</th>
                            <th style="width: 14%">মেয়াদ শেষ (অটো)</th>
                            <th style="width: 10%">স্ট্যাটাস</th>
                            <th style="width: 13%">অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr>
                            <td colspan="8" class="text-center text-gray-400 py-8">
                                <i class="fas fa-spinner fa-spin mr-2"></i>ইউজার ডেটা লোড হচ্ছে...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        $(function() {
            $('#header-placeholder').load('assets/header.html');
            $('#footer-placeholder').load('assets/footer.html');
        });

        async function loadDashboardData() {
            try {
                const db = firebase.firestore();
                const usersSnapshot = await db.collection('users').get();
                const users = [];
                
                usersSnapshot.forEach(doc => {
                    users.push({ id: doc.id, ...doc.data() });
                });
                
                const totalUsers = users.length;
                const paidUsers = users.filter(u => u.isPaid === true).length;
                const freeUsers = totalUsers - paidUsers;
                
                document.getElementById('totalUsers').textContent = totalUsers;
                document.getElementById('paidUsers').textContent = paidUsers;
                document.getElementById('freeUsers').textContent = freeUsers;
                
                try {
                    const ordersSnapshot = await db.collection('orders').get();
                    document.getElementById('totalOrders').textContent = ordersSnapshot.size;
                } catch (e) {
                    document.getElementById('totalOrders').textContent = '০';
                }
                
                renderUsersTable(users);
                renderChart(users);
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('usersTableBody').innerHTML = `
                    <tr>
                        <td colspan="8" class="text-center text-red-500 py-8">
                            <i class="fas fa-exclamation-circle mr-2"></i>ডাটা লোড করতে সমস্যা হয়েছে।
                        </td>
                    </tr>
                `;
            }
        }

        function renderUsersTable(users) {
            const tbody = document.getElementById('usersTableBody');
            if (users.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center text-gray-400 py-8">কোন ইউজার পাওয়া যায়নি</td></tr>`;
                return;
            }
            
            let html = '';
            users.forEach((user, index) => {
                const statusClass = user.isPaid ? 'status-active' : 'status-inactive';
                const statusText = user.isPaid ? 'পেইড' : 'ফ্রি';
                
                const phone = user.phone || '';
                const amount = user.paymentAmount || '';
                const startDate = user.accessStartDate || '';
                const endDate = user.accessEndDate || '';
                
                html += `
                    <tr id="row-${user.id}">
                        <td>${index + 1}</td>
                        <td>
                            <div class="font-semibold text-gray-900">${user.name || 'নাম নেই'}</div>
                            <div class="text-xs text-gray-500">${user.email || ''}</div>
                        </td>
                        <td>
                            <input type="tel" id="phone-${user.id}" value="${phone}" placeholder="017xxxxxxxx" class="table-input">
                        </td>
                        <td>
                            <input type="number" id="amount-${user.id}" value="${amount}" placeholder="টাকা" class="table-input" oninput="calculateExpiry('${user.id}')">
                        </td>
                        <td>
                            <input type="date" id="start-${user.id}" value="${startDate}" class="table-input" onchange="calculateExpiry('${user.id}')">
                        </td>
                        <td>
                            <input type="date" id="end-${user.id}" value="${endDate}" class="table-input readonly-input" readonly>
                        </td>
                        <td>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </td>
                        <td>
                            <div class="flex gap-1.5">
                                <button onclick="saveUserAccess('${user.id}')" class="btn-action btn-save">
                                    <i class="fas fa-save"></i> সেভ
                                </button>
                                <button onclick="deleteUser('${user.id}')" class="btn-action btn-delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function calculateExpiry(userId) {
            const amountInput = document.getElementById(`amount-${userId}`).value;
            const startInput = document.getElementById(`start-${userId}`).value;
            const endInput = document.getElementById(`end-${userId}`);
            
            if (!amountInput || !startInput) {
                endInput.value = '';
                return;
            }
            
            const amount = parseFloat(amountInput);
            if (amount <= 0) {
                endInput.value = '';
                return;
            }
            
            const daysTo_add = Math.floor((amount / 50) * 30);
            const startDate = new Date(startInput);
            startDate.setDate(startDate.getDate() + daysTo_add);
            
            const year = startDate.getFullYear();
            const month = String(startDate.getMonth() + 1).padStart(2, '0');
            const day = String(startDate.getDate()).padStart(2, '0');
            
            endInput.value = `${year}-${month}-${day}`;
        }

        async function saveUserAccess(userId) {
            const phone = document.getElementById(`phone-${userId}`).value;
            const amount = document.getElementById(`amount-${userId}`).value;
            const startDate = document.getElementById(`start-${userId}`).value;
            const endDate = document.getElementById(`end-${userId}`).value;
            
            const isPaid = amount > 0 ? true : false;
            
            try {
                await firebase.firestore().collection('users').doc(userId).update({
                    phone: phone,
                    paymentAmount: amount ? parseFloat(amount) : 0,
                    accessStartDate: startDate,
                    accessEndDate: endDate,
                    isPaid: isPaid
                });
                
                alert('ইউজার ডাটা সফলভাবে ফায়ারবেসে সেভ করা হয়েছে!');
                loadDashboardData(); 
            } catch (error) {
                alert('সেভ করতে সমস্যা হয়েছে: ' + error.message);
            }
        }

        async function deleteUser(userId) {
            if (!confirm('আপনি কি নিশ্চিতভাবে এই ইউজারকে মুছে ফেলতে চান?')) return;
            try {
                await firebase.firestore().collection('users').doc(userId).delete();
                alert('ইউজার ডিলিট করা হয়েছে!');
                loadDashboardData();
            } catch (error) {
                alert('ডিলিট ব্যর্থ হয়েছে: ' + error.message);
            }
        }

        function renderChart(users) {
            const chartCanvas = document.getElementById('userGrowthChart');
            if (!chartCanvas) return;
            const ctx = chartCanvas.getContext('2d');
            
            const months = ['জানু', 'ফেব্রু', 'মার্চ', 'এপ্রিল', 'মে', 'জুন', 'জুলাই', 'আগস্ট', 'সেপ্ট', 'অক্টো', 'নভে', 'ডিসে'];
            const userCounts = [5, 12, 18, 25, 32, users.length, users.length, users.length, users.length, users.length, users.length, users.length];
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'ইউজার সংখ্যা',
                        data: userCounts,
                        borderColor: '#059669',
                        backgroundColor: 'rgba(5, 150, 105, 0.05)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        document.getElementById('searchUser').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const rows = document.querySelectorAll('#usersTableBody tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(searchTerm) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
