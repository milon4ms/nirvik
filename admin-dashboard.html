<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন ড্যাশবোর্ড - নির্বিক হোমিও</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js"></script>
    
    <!-- Firebase Config -->
    <script src="assets/js/firebase-config.js"></script>

    <style>
        body { 
            font-family: 'SolaimanLipi', system-ui, sans-serif; 
            background: #f0fdf4;
            min-height: 100vh;
        }
        
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: all 0.3s;
            border: 1px solid #e2e8f0;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        
        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .table-container {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 12px 16px;
            background: #f7fafc;
            font-weight: 600;
            color: #2d3748;
            border-bottom: 2px solid #e2e8f0;
        }
        
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            color: #4a5568;
        }
        
        tr:hover {
            background: #f7fafc;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-active {
            background: #c6f6d5;
            color: #276749;
        }
        
        .status-inactive {
            background: #fed7d7;
            color: #c53030;
        }
        
        .status-pending {
            background: #fefcbf;
            color: #975a16;
        }
        
        .btn-action {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        
        .btn-action:hover {
            transform: scale(1.05);
        }
        
        .btn-edit {
            background: #ebf8ff;
            color: #2b6cb0;
        }
        
        .btn-edit:hover {
            background: #bee3f8;
        }
        
        .btn-delete {
            background: #fff5f5;
            color: #c53030;
        }
        
        .btn-delete:hover {
            background: #fed7d7;
        }
        
        .btn-view {
            background: #f0fff4;
            color: #276749;
        }
        
        .btn-view:hover {
            background: #c6f6d5;
        }
        
        @media (max-width: 640px) {
            .stat-card {
                padding: 16px;
            }
            
            .stat-icon {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
            
            .table-container {
                padding: 12px;
            }
            
            th, td {
                padding: 8px 12px;
                font-size: 14px;
            }
        }
        
        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in {
            animation: fadeInUp 0.5s ease-out;
        }
        
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
    </style>
</head>
<body>

    <!-- ===== হেডার ===== -->
    <div id="header-placeholder"></div>

    <!-- ===== অ্যাডমিন ড্যাশবোর্ড ===== -->
    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- শিরোনাম -->
        <div class="mb-8 fade-in">
            <h1 class="text-3xl font-bold text-gray-800">
                <i class="fas fa-shield-alt text-teal-600 mr-3"></i>অ্যাডমিন ড্যাশবোর্ড
            </h1>
            <p class="text-gray-500 mt-1">সকল ইউজার, অর্ডার ও সিস্টেম মনিটর করুন</p>
        </div>

        <!-- স্ট্যাটিস্টিক্স কার্ড -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <!-- মোট ইউজার -->
            <div class="stat-card fade-in delay-1">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">মোট ইউজার</p>
                        <p class="text-3xl font-bold text-gray-800" id="totalUsers">০</p>
                        <p class="text-xs text-gray-400 mt-1">সকল রেজিস্টার্ড ইউজার</p>
                    </div>
                    <div class="stat-icon bg-blue-50 text-blue-600">
                        <i class="fas fa-users"></i>
                    </div>
                </div>
            </div>
            
            <!-- পেইড ইউজার -->
            <div class="stat-card fade-in delay-2">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">পেইড ইউজার</p>
                        <p class="text-3xl font-bold text-gray-800" id="paidUsers">০</p>
                        <p class="text-xs text-gray-400 mt-1">প্রিমিয়াম সদস্য</p>
                    </div>
                    <div class="stat-icon bg-green-50 text-green-600">
                        <i class="fas fa-crown"></i>
                    </div>
                </div>
            </div>
            
            <!-- ফ্রি ইউজার -->
            <div class="stat-card fade-in delay-3">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">ফ্রি ইউজার</p>
                        <p class="text-3xl font-bold text-gray-800" id="freeUsers">০</p>
                        <p class="text-xs text-gray-400 mt-1">বিনামূল্যে সদস্য</p>
                    </div>
                    <div class="stat-icon bg-yellow-50 text-yellow-600">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <!-- মোট অর্ডার -->
            <div class="stat-card fade-in delay-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">মোট অর্ডার</p>
                        <p class="text-3xl font-bold text-gray-800" id="totalOrders">০</p>
                        <p class="text-xs text-gray-400 mt-1">সকল অর্ডার</p>
                    </div>
                    <div class="stat-icon bg-purple-50 text-purple-600">
                        <i class="fas fa-shopping-cart"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- চার্ট ও কুইক অ্যাকশন -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <!-- চার্ট -->
            <div class="lg:col-span-2 table-container fade-in">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">
                    <i class="fas fa-chart-bar text-teal-600 mr-2"></i>ইউজার গ্রোথ
                </h3>
                <canvas id="userGrowthChart" height="200"></canvas>
            </div>
            
            <!-- কুইক অ্যাকশন -->
            <div class="table-container fade-in">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">
                    <i class="fas fa-bolt text-teal-600 mr-2"></i>কুইক অ্যাকশন
                </h3>
                <div class="space-y-3">
                    <button onclick="window.location.href='register.html'" class="w-full bg-teal-600 text-white px-4 py-3 rounded-xl hover:bg-teal-700 transition flex items-center justify-center gap-2">
                        <i class="fas fa-user-plus"></i> নতুন ইউজার যোগ করুন
                    </button>
                    <button onclick="window.location.href='manage-users.html'" class="w-full bg-blue-600 text-white px-4 py-3 rounded-xl hover:bg-blue-700 transition flex items-center justify-center gap-2">
                        <i class="fas fa-users-cog"></i> ইউজার ম্যানেজ
                    </button>
                    <button onclick="window.location.href='medica/index.html'" class="w-full bg-purple-600 text-white px-4 py-3 rounded-xl hover:bg-purple-700 transition flex items-center justify-center gap-2">
                        <i class="fas fa-book-medical"></i> মেডিকা এডিট
                    </button>
                    <button onclick="window.location.href='index.html'" class="w-full bg-gray-600 text-white px-4 py-3 rounded-xl hover:bg-gray-700 transition flex items-center justify-center gap-2">
                        <i class="fas fa-home"></i> হোম পেজ
                    </button>
                </div>
            </div>
        </div>

        <!-- ইউজার লিস্ট -->
        <div class="table-container fade-in">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                <h3 class="text-lg font-semibold text-gray-800">
                    <i class="fas fa-list text-teal-600 mr-2"></i>সকল ইউজার লিস্ট
                </h3>
                <div class="flex gap-2 w-full sm:w-auto">
                    <input type="text" id="searchUser" placeholder="ইউজার সার্চ করুন..." class="flex-1 sm:w-48 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-teal-600 text-sm">
                    <button onclick="loadUsers()" class="bg-teal-600 text-white px-4 py-2 rounded-lg hover:bg-teal-700 transition text-sm">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>
            
            <div id="usersTableWrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>নাম</th>
                            <th>ইমেইল</th>
                            <th>রোল</th>
                            <th>স্ট্যাটাস</th>
                            <th>অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr>
                            <td colspan="6" class="text-center text-gray-400 py-8">
                                <i class="fas fa-spinner fa-spin mr-2"></i>লোড হচ্ছে...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ===== ফুটার ===== -->
    <div id="footer-placeholder"></div>

    <script>
        // ===== হেডার/ফুটার লোড =====
        $(function() {
            $('#header-placeholder').load('assets/header.html', function() {
                // Mobile menu toggle
                const btn = document.getElementById('mobile-menu-btn');
                const menu = document.getElementById('mobile-menu');
                if (btn && menu) {
                    btn.addEventListener('click', function() {
                        menu.classList.toggle('hidden');
                        btn.innerHTML = menu.classList.contains('hidden') 
                            ? '<i class="fas fa-bars"></i>' 
                            : '<i class="fas fa-times"></i>';
                    });
                }
            });
            $('#footer-placeholder').load('assets/footer.html');
        });

        // ===== Firebase Auth Check =====
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            // চেক করুন ইউজার অ্যাডমিন কিনা
            const userStr = localStorage.getItem('user');
            if (userStr) {
                const userData = JSON.parse(userStr);
                if (userData.role !== 'admin') {
                    alert('আপনার অ্যাডমিন অ্যাক্সেস নেই!');
                    window.location.href = 'dashboard.html';
                    return;
                }
            }
            
            // ডাটা লোড করুন
            loadDashboardData();
        });

        // ===== ড্যাশবোর্ড ডাটা লোড =====
        async function loadDashboardData() {
            try {
                const db = firebase.firestore();
                
                // সকল ইউজার লোড
                const usersSnapshot = await db.collection('users').get();
                const users = [];
                usersSnapshot.forEach(doc => {
                    users.push({ id: doc.id, ...doc.data() });
                });
                
                // স্ট্যাটিস্টিক্স আপডেট
                const totalUsers = users.length;
                const paidUsers = users.filter(u => u.isPaid === true).length;
                const freeUsers = totalUsers - paidUsers;
                
                document.getElementById('totalUsers').textContent = totalUsers;
                document.getElementById('paidUsers').textContent = paidUsers;
                document.getElementById('freeUsers').textContent = freeUsers;
                
                // অর্ডার কাউন্ট (যদি অর্ডার কালেকশন থাকে)
                try {
                    const ordersSnapshot = await db.collection('orders').get();
                    document.getElementById('totalOrders').textContent = ordersSnapshot.size;
                } catch (e) {
                    document.getElementById('totalOrders').textContent = '০';
                }
                
                // ইউজার টেবিল লোড
                renderUsersTable(users);
                
                // চার্ট লোড
                renderChart(users);
                
            } catch (error) {
                console.error('Error loading dashboard data:', error);
                document.getElementById('usersTableBody').innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center text-red-500 py-8">
                            <i class="fas fa-exclamation-circle mr-2"></i>ডাটা লোড করতে সমস্যা হয়েছে
                        </td>
                    </tr>
                `;
            }
        }

        // ===== ইউজার টেবিল রেন্ডার =====
        function renderUsersTable(users) {
            const tbody = document.getElementById('usersTableBody');
            
            if (users.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center text-gray-400 py-8">
                            <i class="fas fa-user-slash mr-2"></i>কোন ইউজার পাওয়া যায়নি
                        </td>
                    </tr>
                `;
                return;
            }
            
            let html = '';
            users.forEach((user, index) => {
                const statusClass = user.isPaid ? 'status-active' : 'status-inactive';
                const statusText = user.isPaid ? 'পেইড' : 'ফ্রি';
                
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td class="font-medium">${user.name || 'নাম নেই'}</td>
                        <td>${user.email || 'ইমেইল নেই'}</td>
                        <td>
                            <span class="status-badge ${user.role === 'admin' ? 'status-active' : 'status-pending'}">
                                ${user.role || 'general'}
                            </span>
                        </td>
                        <td>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </td>
                        <td>
                            <div class="flex gap-2">
                                <button onclick="editUser('${user.id}')" class="btn-action btn-edit">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="viewUser('${user.id}')" class="btn-action btn-view">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button onclick="deleteUser('${user.id}')" class="btn-action btn-delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }

        // ===== চার্ট রেন্ডার =====
        function renderChart(users) {
            const ctx = document.getElementById('userGrowthChart').getContext('2d');
            
            // মাস অনুযায়ী ইউজার কাউন্ট (ডেমো ডাটা)
            const months = ['জানু', 'ফেব্রু', 'মার্চ', 'এপ্রিল', 'মে', 'জুন', 'জুলাই', 'আগস্ট', 'সেপ্ট', 'অক্টো', 'নভে', 'ডিসে'];
            const currentMonth = new Date().getMonth();
            
            // ডেমো ডাটা জেনারেট
            const userCounts = [];
            let count = 0;
            for (let i = 0; i < 12; i++) {
                count += Math.floor(Math.random() * 5) + 1;
                userCounts.push(count);
            }
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'মোট ইউজার',
                        data: userCounts,
                        borderColor: '#00b8a9',
                        backgroundColor: 'rgba(0, 184, 169, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 5
                            }
                        }
                    }
                }
            });
        }

        // ===== ইউজার অ্যাকশন =====
        function editUser(userId) {
            window.location.href = `edit-user.html?id=${userId}`;
        }

        function viewUser(userId) {
            window.location.href = `user-profile.html?id=${userId}`;
        }

        async function deleteUser(userId) {
            if (!confirm('আপনি কি এই ইউজারকে ডিলিট করতে চান?')) return;
            
            try {
                await firebase.firestore().collection('users').doc(userId).delete();
                alert('ইউজার ডিলিট করা হয়েছে!');
                loadDashboardData();
            } catch (error) {
                alert('ডিলিট করতে সমস্যা হয়েছে: ' + error.message);
            }
        }

        // ===== সার্চ ফাংশন =====
        document.getElementById('searchUser').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const rows = document.querySelectorAll('#usersTableBody tr');
            
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(searchTerm) ? '' : 'none';
            });
        });

        // ===== রিফ্রেশ বাটন =====
        window.loadUsers = loadDashboardData;
    </script>

</body>
</html>
