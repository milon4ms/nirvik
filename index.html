<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perplexity AI প্রম্পট জেনারেটর</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 10px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        .preview {
            background: #f0f0f0;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            font-size: 14px;
            color: #333;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .note {
            font-size: 12px;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Perplexity AI</h1>
        <p>প্রম্পট জেনারেট করে সরাসরি পাঠান</p>
        
        <div class="preview" id="preview">
            💡 একটি বাটনে ক্লিক করুন
        </div>
        
        <button onclick="sendToPerplexity('story')">📖 গল্প লিখুন</button>
        <button onclick="sendToPerplexity('code')">💻 কোড লিখুন</button>
        <button onclick="sendToPerplexity('math')">🧮 গণিত সমাধান</button>
        <button onclick="sendToPerplexity('translate')">🌐 অনুবাদ করুন</button>
        
        <div class="note">
            ✅ প্রম্পট জেনারেট হবে → Perplexity খুলবে → প্রম্পট অটো-পেস্ট থাকবে
        </div>
    </div>

    <script>
        // প্রম্পট লাইব্রেরি
        const promptLibrary = {
            story: "একটি ছোট গল্প লেখ। গল্প: একটি বুদ্ধিমান কুকুর যে তার মালিককে উদ্ধার করে।",
            
            code: "JavaScript দিয়ে একটি ফাংশন লেখ যা ইনপুট সংখ্যা জোড় না বিজোড় তা বলে দেয়।",
            
            math: "সমাধান কর: একজন দোকানদার ৫০০ টাকায় একটি পণ্য কিনে ২০% লাভে বিক্রি করে। বিক্রয়মূল্য কত?",
            
            translate: "'Artificial Intelligence is changing the world' - এই বাক্যটি বাংলায় অনুবাদ কর।"
        };
        
        // প্রধান ফাংশন
        function sendToPerplexity(type) {
            // প্রম্পট সিলেক্ট
            const promptText = promptLibrary[type];
            
            // প্রিভিউ দেখান
            document.getElementById('preview').innerHTML = `📝 প্রম্পট: ${promptText}`;
            
            // Perplexity URL তৈরি
            const encodedPrompt = encodeURIComponent(promptText);
            const perplexityUrl = `https://www.perplexity.ai/?q=${encodedPrompt}`;
            
            // নতুন ট্যাবে খোলা
            window.open(perplexityUrl, '_blank');
            
            // কনসোলে দেখান
            console.log('পাঠানো হয়েছে:', promptText);
        }
    </script>
</body>
</html>
