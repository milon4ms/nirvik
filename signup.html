<!DOCTYPE html>
<html lang="bn">
<head>
    <!-- ... আপনার হেডার ... -->
</head>
<body>

    <!-- ===== হেডার ===== -->
    <div id="header-placeholder"></div>

    <!-- ... ফর্ম HTML ... -->

    <!-- ===== ফুটার ===== -->
    <div id="footer-placeholder"></div>

    <!-- ===== Firebase Script (Compat) ===== -->
    <script>
        // Firebase ইতিমধ্যে header-এ লোড হয়েছে
        // এখানে সরাসরি auth ও db ব্যবহার করুন

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const name = document.getElementById('displayName').value || 'ইউজার';

            if (password !== confirm) {
                alert('❌ পাসওয়ার্ড দুটি মিলছে না!');
                return;
            }

            try {
                // Firebase-এ ইউজার তৈরি
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // ইউজার প্রোফাইল আপডেট
                await user.updateProfile({ displayName: name });

                // Firestore-এ ইউজার ডেটা সংরক্ষণ
                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    email: email,
                    name: name,
                    role: 'general',
                    isPaid: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert('✅ রেজিস্ট্রেশন সফল! এখন লগইন করুন।');
                window.location.href = 'login.html';

            } catch (error) {
                alert('❌ ' + error.message);
            }
        });
    </script>

    <!-- ===== হেডার/ফুটার লোড ===== -->
    <script>
        $(function() {
            $('#header-placeholder').load('assets/header.html');
            $('#footer-placeholder').load('assets/footer.html');
        });
    </script>

</body>
</html>
