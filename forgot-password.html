<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পাসওয়ার্ড ভুলে গেছেন? - নির্ভীক হোমিও</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- SolaimanLipi Font -->
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    
    <!-- আপনার ফায়ারবেস কনফিগারেশন ফাইল -->
    <script src="assets/js/firebase-config.js"></script>

    <style>
        body { 
            font-family: 'SolaimanLipi', system-ui, sans-serif; 
        }
    </style>
</head>
<body class="bg-emerald-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full border border-emerald-100">
        <!-- হেডিং সেকশন -->
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-teal-100 text-teal-600 rounded-full mb-4 text-2xl">
                <i class="fas fa-key"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">পাসওয়ার্ড পুনরুদ্ধার</h2>
            <p class="text-sm text-gray-500 mt-2">আপনার অ্যাকাউন্টের রেজিস্টার্ড ইমেইলটি নিচে লিখুন। আমরা আপনাকে পাসওয়ার্ড রিসেট করার একটি লিংক পাঠাবো।</p>
        </div>

        <!-- অ্যালার্ট/মেসেজ বক্স (সফল বা ভুল হলে দেখানোর জন্য) -->
        <div id="message-box" class="hidden mb-4 p-4 rounded-xl text-sm font-medium"></div>

        <!-- ফর্ম -->
        <form id="reset-form" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">ইমেইল অ্যাড্রেস</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" id="email" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition"
                        placeholder="example@email.com">
                </div>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-teal-600 hover:bg-teal-700 text-white font-medium py-3 px-4 rounded-xl transition shadow-md flex items-center justify-center gap-2">
                <span id="btn-text">রিসেট লিংক পাঠান</span>
                <span id="btn-spinner" class="hidden inline-block animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent"></span>
            </button>
        </form>

        <!-- নিচের লিংকসমূহ -->
        <div class="mt-6 text-center text-sm space-y-2">
            <p class="text-gray-600">
                পাসওয়ার্ড মনে পড়েছে? 
                <a href="login.html" class="text-teal-600 hover:underline font-semibold ml-1">লগ ইন করুন</a>
            </p>
            <p>
                <a href="index.html" class="text-gray-500 hover:text-gray-700 inline-flex items-center gap-1 text-xs">
                    <i class="fas fa-arrow-left"></i> হোমপেজে ফিরে যান
                </a>
            </p>
        </div>
    </div>

    <!-- পাসওয়ার্ড রিসেট করার জাভাস্ক্রিপ্ট লজিক -->
    <script>
        document.getElementById('reset-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const messageBox = document.getElementById('message-box');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');

            // বোতামটি লোডিং অবস্থায় নিয়ে যাওয়া
            submitBtn.disabled = true;
            btnText.innerText = "প্রসেসিং হচ্ছে...";
            btnSpinner.classList.remove('hidden');
            messageBox.classList.add('hidden');

            // Firebase এর মাধ্যমে পাসওয়ার্ড রিসেট মেইল পাঠানো
            firebase.auth().sendPasswordResetEmail(email)
                .then(() => {
                    // সফল হলে
                    messageBox.className = "mb-4 p-4 rounded-xl text-sm font-medium bg-green-100 text-green-700 border border-green-200";
                    messageBox.innerHTML = `<i class="fas fa-check-circle mr-1"></i> আপনার ইমেইলে একটি পাসওয়ার্ড রিসেট লিংক পাঠানো হয়েছে। অনুগ্রহ করে ইনবক্স বা স্প্যাম ফোল্ডার চেক করুন।`;
                    messageBox.classList.remove('hidden');
                    
                    // ফর্ম রিসেট করা
                    document.getElementById('reset-form').reset();
                })
                .catch((error) => {
                    // কোনো সমস্যা বা এরর হলে
                    messageBox.className = "mb-4 p-4 rounded-xl text-sm font-medium bg-red-100 text-red-700 border border-red-200";
                    
                    let errorMessage = "দুঃখিত, কোনো একটি সমস্যা হয়েছে। আবার চেষ্টা করুন।";
                    if (error.code === 'auth/user-not-found') {
                        errorMessage = "এই ইমেইল দিয়ে কোনো অ্যাকাউন্ট তৈরি করা হয়নি।";
                    } else if (error.code === 'auth/invalid-email') {
                        errorMessage = "অনুগ্রহ করে একটি সঠিক ইমেইল অ্যাড্রেস লিখুন।";
                    }

                    messageBox.innerHTML = `<i class="fas fa-exclamation-circle mr-1"></i> ${errorMessage}`;
                    messageBox.classList.remove('hidden');
                })
                .finally(() => {
                    // বোতামটি আবার আগের অবস্থায় ফিরিয়ে আনা
                    submitBtn.disabled = false;
                    btnText.innerText = "রিসেট লিংক পাঠান";
                    btnSpinner.classList.add('hidden');
                });
        });
    </script>

</body>
</html>
