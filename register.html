<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রেজিস্ট্রেশন - নির্ভীক হোমিও</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js"></script>
    
    <script src="assets/js/firebase-config.js"></script>

    <style>
        body { font-family: 'SolaimanLipi', system-ui, sans-serif; background: #f0fdf4; }
        
        /* হেডার ও মেনুর কালার সমস্যা সমাধানের ফিক্স */
        #header-placeholder, nav {
            background-color: #065f46 !important; /* ডার্ক গ্রিন ব্যাকগ্রাউন্ড */
        }
        #header-placeholder a, #header-placeholder button, nav a {
            color: #ffffff !important; /* টেক্সট কালার সাদা */
            opacity: 1 !important;
        }
        #header-placeholder a:hover, nav a:hover {
            color: #a7f3d0 !important; /* হোভার কালার */
        }

        .register-container { max-width: 480px; margin: 40px auto; }
        .register-box { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); padding: 40px; }
        input { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; transition: all 0.2s; }
        input:focus { outline: none; border-color: #00b8a9; box-shadow: 0 0 0 3px rgba(0,184,169,0.1); }
        .btn-register { background: linear-gradient(135deg, #00b8a9, #00897b); color: white; padding: 14px; border: none; border-radius: 12px; width: 100%; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,184,169,0.3); }
        .btn-register:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-msg { color: #e53e3e; font-size: 14px; margin-top: 5px; display: none; }
        .success-msg { color: #38a169; font-size: 14px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="register-container px-4">
        <div class="register-box">
            <div class="text-center mb-8">
                <div class="text-5xl mb-4">🌿</div>
                <h1 class="text-3xl font-bold text-gray-800">নতুন অ্যাকাউন্ট</h1>
                <p class="text-gray-500 mt-2">নির্বিক হোমিওতে স্বাগতম</p>
            </div>

            <form id="registerForm">
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">👤 নাম</label>
                    <input type="text" id="displayName" placeholder="আপনার নাম" required>
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">📞 ফোন নাম্বার</label>
                    <input type="text" id="phone" placeholder="01XXXXXXXXX (১১ ডিজিট)" required>
                    <div id="phoneError" class="error-msg">❌ ফোন নাম্বারটি অবশ্যই ১১ ডিজিটের এবং ০১ দিয়ে শুরু হতে হবে!</div>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">📧 ইমেইল (ঐচ্ছিক)</label>
                    <input type="email" id="email" placeholder="আপনার ইমেইল ঠিকানা (না দিলেও চলবে)">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">🔒 পাসওয়ার্ড</label>
                    <input type="password" id="password" placeholder="কমপক্ষে ৬ অক্ষরের" required minlength="6">
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 font-medium mb-2">🔒 পাসওয়ার্ড নিশ্চিত করুন</label>
                    <input type="password" id="confirmPassword" placeholder="আবার পাসওয়ার্ড লিখুন" required>
                    <div id="passwordError" class="error-msg">❌ পাসওয়ার্ড দুটি মিলছে না!</div>
                </div>

                <button type="submit" class="btn-register" id="registerBtn">
                    <i class="fas fa-user-plus mr-2"></i> অ্যাকাউন্ট তৈরি করুন
                </button>

                <p class="text-center mt-6 text-gray-600">
                    ইতিমধ্যে অ্যাকাউন্ট আছে? 
                    <a href="login.html" class="text-teal-600 font-bold">লগইন করুন</a>
                </p>
            </form>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        // ===== হেডার/ফুটার লোড ও স্টাইল ইনজেকশন =====
        $(function() {
            $('#header-placeholder').load('assets/header.html', function() {
                // ইনজেক্টেড হেডারের ব্যাকগ্রাউন্ড কালার ও টেক্সট কালার ফোর্স ফিক্স
                $('#header-placeholder').find('nav, div.bg-white, div.bg-emerald-600').css('background-color', '#065f46');
                $('#header-placeholder').find('a, button, span').css('color', '#ffffff');

                const btn = document.getElementById('mobile-menu-btn');
                const menu = document.getElementById('mobile-menu');
                if (btn && menu) {
                    btn.addEventListener('click', function() {
                        menu.classList.toggle('hidden');
                        btn.innerHTML = menu.classList.contains('hidden') 
                            ? '<i class="fas fa-bars"></i>' 
                            : '<i class="fas fa-times"></i>';
                    });
                }
            });
            $('#footer-placeholder').load('assets/footer.html');
        });

        // ===== বাংলা সংখ্যাকে ইংরেজিতে রূপান্তরের হেল্পার ফাংশন =====
        function convertBanglaToEnglish(str) {
            const banglaDigits = {'০':'0','১':'1','২':'2','৩':'3','৪':'4','৫':'5','৬':'6','৭':'7','৮':'8','৯':'9'};
            return str.replace(/[০-৯]/g, function(w) { return banglaDigits[w]; });
        }

        // ===== রেজিস্ট্রেশন ফাংশন =====
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('displayName').value.trim() || 'ইউজার';
            let phone = document.getElementById('phone').value.trim();
            let email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('registerBtn');

            // হাইড এরর মেসেজ রিসেট
            document.getElementById('phoneError').style.display = 'none';
            document.getElementById('passwordError').style.display = 'none';

            // ১. ফোন নাম্বার ফরমেট ভ্যালিডেশন (বাংলা/ইংরেজি যাই হোক)
            phone = convertBanglaToEnglish(phone);
            const phonePattern = /^01[0-9]{9}$/;
            if (!phonePattern.test(phone)) {
                document.getElementById('phoneError').style.display = 'block';
                document.getElementById('phone').focus();
                return;
            }

            // ২. পাসওয়ার্ড মিল চেক
            if (password !== confirm) {
                document.getElementById('passwordError').style.display = 'block';
                document.getElementById('confirmPassword').focus();
                return;
            }

            // ৩. ইমেইল না দিলে ডামি ইমেইল জেনারেট (Firebase Auth সেশন সচল রাখার জন্য)
            if (!email) {
                email = `${phone}@nirvik.com`; 
            }

            // বাটন ডিজেবল
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> প্রক্রিয়াকরণ...';

            try {
                // Firebase Auth-এ ইউজার তৈরি
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // প্রোফাইল আপডেট (ডিসপ্লে নেম)
                await user.updateProfile({ displayName: name });

                // Firestore-এ তথ্য সংরক্ষণ (ফোন নাম্বার সহ)
                await firebase.firestore().collection('users').doc(user.uid).set({
                    uid: user.uid,
                    email: email,
                    name: name,
                    phone: phone, // ফোন নাম্বার ফিল্ড যুক্ত করা হলো
                    role: 'general',
                    isPaid: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    emailVerified: user.emailVerified
                });

                alert('✅ রেজিস্ট্রেশন সফল হয়েছে! অনুগ্রহ করে লগইন করুন।');
                window.location.href = 'login.html';

            } catch (error) {
                console.error("Registration error:", error);
                let msg = error.message;
                if(error.code === 'auth/email-already-in-use') {
                    msg = "এই ফোন নাম্বার বা ইমেইল দিয়ে ইতিপূর্বে অ্যাকাউন্ট খোলা হয়েছে।";
                }
                alert('❌ ' + msg);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus mr-2"></i> অ্যাকাউন্ট তৈরি করুন';
            }
        });
    </script>

</body>
</html>
