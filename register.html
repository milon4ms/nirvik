<!DOCTYPE html>
<html lang="bn">
<head>
    <!-- Tailwind, Font Awesome, jQuery ইত্যাদি আগের মতো রাখুন -->
    
    <!-- 🔥 Firebase শুধু এখানে লোড করুন (header-এ নয়) -->
    <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
</head>
<body>

    <div id="header-placeholder"></div>
    
    <!-- ... ফর্ম HTML ... -->
    
    <div id="footer-placeholder"></div>

    <script>
        // jQuery দিয়ে হেডার/ফুটার লোড
        $(function() {
            $('#header-placeholder').load('assets/header.html', function() {
                // মোবাইল মেনু সক্রিয় করুন (যদি প্রয়োজন)
            });
            $('#footer-placeholder').load('assets/footer.html');
        });

        // রেজিস্ট্রেশন ফাংশন
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const name = document.getElementById('displayName').value || 'ইউজার';

            if (password !== confirm) {
                alert('❌ পাসওয়ার্ড দুটি মিলছে না!');
                return;
            }

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                await user.updateProfile({ displayName: name });

                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    email: email,
                    name: name,
                    role: 'general',
                    isPaid: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert('✅ রেজিস্ট্রেশন সফল!');
                window.location.href = 'login.html';

            } catch (error) {
                alert('❌ ' + error.message);
            }
        });
    </script>
</body>
</html>
