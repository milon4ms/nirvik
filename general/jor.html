<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জ্বর সর্দি কাশি বিশ্লেষণ - নির্বিক হোমিও</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    
    <!-- jQuery (হেডার-ফুটার লোডের জন্য) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body { 
            font-family: 'SolaimanLipi', system-ui, sans-serif; 
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        #result {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        textarea, input[type="text"], input[type="email"], input[type="password"] {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        .checkbox-group label {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .container-custom {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            padding: 30px;
        }

        .page-header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 25px;
        }

        .page-header h1 {
            font-size: 28px;
            color: #2d3748;
            background: linear-gradient(135deg, #00b8a9, #00897b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header p {
            color: #718096;
            font-size: 14px;
            margin-top: 5px;
        }

        .section {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 16px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .section:hover {
            border-color: #00b8a9;
        }

        .section h3 {
            background: linear-gradient(135deg, #00b8a9, #00897b);
            color: white;
            font-size: 18px;
            padding: 12px 18px;
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .section h3:hover {
            background: linear-gradient(135deg, #00897b, #00695c);
        }

        .section h3 .arrow {
            font-size: 12px;
            transition: transform 0.3s;
            display: inline-block;
        }

        .section h3 .arrow.open {
            transform: rotate(180deg);
        }

        .checkbox-group {
            padding: 16px 20px;
            display: none;
            flex-wrap: wrap;
            gap: 8px 16px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .checkbox-group.open {
            display: flex;
        }

        .checkbox-group label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #2d3748;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.15s;
        }

        .checkbox-group label:hover {
            background: #edf2f7;
        }

        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #00b8a9;
            cursor: pointer;
        }

        .section-content {
            display: none;
        }

        .section-content.open {
            display: block;
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
            background: white;
            margin: 0;
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: #00b8a9;
            box-shadow: 0 0 0 3px rgba(0, 184, 169, 0.1);
        }

        .section textarea {
            border: none;
            border-radius: 0;
            padding: 16px 20px;
            background: #f7fafc;
        }

        .section textarea:focus {
            background: white;
            box-shadow: inset 0 0 0 2px #00b8a9;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0 10px;
            padding: 16px 0;
            border-top: 2px solid #e2e8f0;
        }

        .btn {
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00b8a9, #00897b);
            color: white;
        }

        .btn-copy { background: #718096; color: white; }
        .btn-gemini { background: #4285f4; color: white; }
        .btn-chatgpt { background: #10a37f; color: white; }
        .btn-grok { background: #000000; color: white; }
        .btn-deepseek { background: #4a6cf7; color: white; }
        .btn-perplexity { background: #1f2937; color: white; }
        .btn-pink { background: linear-gradient(135deg, #d53f8c, #b83280); color: white; }

        #result {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px 24px;
            min-height: 120px;
            margin-top: 20px;
            font-size: 15px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            transition: all 0.3s;
        }

        #result:empty::before {
            content: '📋 এখানে রোগী বিশ্লেষণ/প্রম্পট দেখাবে...';
            color: #a0aec0;
            font-style: italic;
        }

        #result h5 {
            color: #00b8a9;
            font-size: 16px;
            margin-bottom: 12px;
        }

        #result p {
            margin-bottom: 6px;
            padding: 4px 0;
            border-bottom: 1px dashed #e2e8f0;
        }

        #result p strong {
            color: #2d3748;
            min-width: 140px;
            display: inline-block;
        }

        .footer-note {
            text-align: center;
            padding-top: 20px;
            margin-top: 20px;
            border-top: 2px solid #e2e8f0;
            font-size: 13px;
            color: #a0aec0;
        }

        @media (max-width: 700px) {
            .container-custom {
                padding: 16px;
            }
            .page-header h1 { font-size: 22px; }
            .section h3 { font-size: 16px; padding: 10px 14px; }
            .checkbox-group { padding: 12px 14px; gap: 4px 10px; }
            .checkbox-group label { font-size: 13px; }
            .btn { padding: 6px 10px; font-size: 11px; }
            .button-group { gap: 6px; }
            #result p strong { min-width: 100px; display: inline; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-teal-50 to-cyan-50 min-h-screen flex flex-col">

    <!-- ===== হেডার প্লেসহোল্ডার ===== -->
    <div id="header-placeholder"></div>

    <!-- ===== মেইন কন্টেন্ট ===== -->
    <main class="flex-1 container mx-auto px-4 py-8">
        <div class="container-custom">

            <form id="symptomForm">

                <!-- ১. রোগের বর্ণনা -->

                        <label><input name="startedWhen" type="checkbox" value="১৫দিন-১মাস"> ১৫দিন-১মাস</label>
                        <label><input name="startedWhen" type="checkbox" value="১মাস-৩মাস"> ১মাস-৩মাস</label>
                        <label><input name="startedWhen" type="checkbox" value="অনেক পুরাতন"> অনেক পুরাতন</label>
                        <label><input name="startedWhen" type="checkbox" value="হঠাৎ শুরু"> হঠাৎ শুরু</label>
                        <label><input name="startedWhen" type="checkbox" value="ধীরে শুরু"> ধীরে শুরু</label>
                        <label><input name="startedWhen" type="checkbox" value="গ্রীষ্মে"> গ্রীষ্মে</label>
                        <label><input name="startedWhen" type="checkbox" value="বর্ষায়"> বর্ষায়</label>
                        <label><input name="startedWhen" type="checkbox" value="শীতে"> শীতে</label>
                        <label><input name="startedWhen" type="checkbox" value="শরতে"> শরতে</label>
                        <label><input name="startedWhen" type="checkbox" value="হেমন্তে"> হেমন্তে</label>
                        <label><input name="startedWhen" type="checkbox" value="সকালে"> সকালে</label>
                        <label><input name="startedWhen" type="checkbox" value="দুপুরে"> দুপুরে</label>
                        <label><input name="startedWhen" type="checkbox" value="বিকালে"> বিকালে</label>
                        <label><input name="startedWhen" type="checkbox" value="সন্ধ্যায়"> সন্ধ্যায়</label>
                        <label><input name="startedWhen" type="checkbox" value="মধ্যরাতে"> মধ্যরাতে</label>
                        <label><input name="startedWhen" type="checkbox" value="ভোরে"> ভোরে</label>
                        <label><input name="startedWhen" type="checkbox" value="ঘুম থেকে উঠলে"> ঘুম থেকে উঠলে</label>
                        <label><input name="startedWhen" type="checkbox" value="ঘুমাতে গেলে"> ঘুমাতে গেলে</label>
                    </div>
                </div>

                <!-- ৩. জ্বরের কারণ -->
                <div class="section">
                    <h3 onclick="toggleSection(this)">
                        <span>৩. জ্বরের কারণ</span>
                        <span class="arrow">▼</span>
                    </h3>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="feverCause" value="ঠাণ্ডা লাগা"> ঠাণ্ডা লাগা</label>
                        <label><input type="checkbox" name="feverCause" value="বৃষ্টি ভেজা"> বৃষ্টি ভেজা</label>
                        <label><input type="checkbox" name="feverCause" value="অতিরিক্ত গরমে থাকা"> অতিরিক্ত গরমে থাকা</label>
                        <label><input type="checkbox" name="feverCause" value="ঋতু পরিবর্তন"> ঋতু পরিবর্তন</label>
                        <label><input type="checkbox" name="feverCause" value="ঠাণ্ডা বাতাসে থাকা"> ঠাণ্ডা বাতাসে থাকা</label>
                        <label><input type="checkbox" name="feverCause" value="হঠাৎ তাপমাত্রা পরিবর্তন"> হঠাৎ তাপমাত্রা পরিবর্তন</label>
                        <label><input type="checkbox" name="feverCause" value="ভয় পেলে জ্বর"> ভয় পেলে জ্বর</label>
                        <label><input type="checkbox" name="feverCause" value="ভাইরাস সংক্রমণ"> ভাইরাস সংক্রমণ</label>
                        <label><input type="checkbox" name="feverCause" value="ব্যাকটেরিয়াল সংক্রমণ"> ব্যাকটেরিয়াল সংক্রমণ</label>
                        <label><input type="checkbox" name="feverCause" value="গলায় সংক্রমণ"> গলায় সংক্রমণ</label>
                        <label><input type="checkbox" name="feverCause" value="সর্দি-কাশি থেকে জ্বর"> সর্দি-কাশি থেকে জ্বর</label>
                        <label><input type="checkbox" name="feverCause" value="পানিবাহিত সংক্রমণ"> পানিবাহিত সংক্রমণ</label>
                        <label><input type="checkbox" name="feverCause" value="খাবার দূষণ"> খাবার দূষণ</label>
                        <label><input type="checkbox" name="feverCause" value="মশাবাহিত সংক্রমণ"> মশাবাহিত সংক্রমণ</label>
                        <label><input type="checkbox" name="feverCause" value="রোদ লেগে জ্বর"> রোদ লেগে জ্বর</label>
                        <label><input type="checkbox" name="feverCause" value="অতিরিক্ত পরিশ্রম"> অতিরিক্ত পরিশ্রম</label>
                        <label><input type="checkbox" name="feverCause" value="ঘুম না হওয়া"> ঘুম না হওয়া</label>
                        <label><input type="checkbox" name="feverCause" value="ডিহাইড্রেশন"> ডিহাইড্রেশন</label>
                        <label><input type="checkbox" name="feverCause" value="দুঃশ্চিন্তায় জ্বর"> দুঃশ্চিন্তায় জ্বর</label>
                    </div>
                </div>

                <!-- ... অন্যান্য ৪৮টি সেকশন (আপনার কোড থেকে একইভাবে রাখুন) ... -->
                <!-- সংক্ষিপ্ততার জন্য আমি বাকি সেকশনগুলো এখানে বাদ দিচ্ছি, তবে আপনি আপনার কোড থেকে পুরোটা কপি করতে পারেন। -->

                <!-- ৫১. রোগীর নাম, ঠিকানা, বয়স, ফোন -->
                <div class="section">
                    <h3 onclick="toggleSection(this)">
                        <span>৫১. রোগীর নাম, ঠিকানা, বয়স, ফোন নম্বর</span>
                        <span class="arrow">▼</span>
                    </h3>
                    <div class="section-content">
                        <textarea name="pationtinfo" placeholder="রোগীর নাম, ঠিকানা, বয়স, ফোন নম্বর লিখুন..."></textarea>
                    </div>
                </div>

                <!-- ===== বাটন কন্টেইনার (JS ডায়নামিক্যালি তৈরি করবে) ===== -->

            <!-- ===== রেজাল্ট বক্স ===== -->

            <div class="footer-note">
                🌿 হোমিওপ্যাথি চিকিৎসকদের জন্য তৈরি — AI-সহায়তা বিশ্লেষণ ও প্রেসক্রিপশন

    <!-- ===== ফুটার প্লেসহোল্ডার ===== -->
    <div id="footer-placeholder"></div>

    <!-- ============================================================ -->
    <!-- ===== সব ফাংশনালিটি একসাথে (ইনলাইন) ===== -->
    <!-- ============================================================ -->
    <script>
        // =================================================================
        // ১. সেকশন টগল
        // =================================================================
        function toggleSection(element) {
            const content = element.nextElementSibling;
            const arrow = element.querySelector('.arrow');
            if (content) {
                if (content.classList.contains('checkbox-group')) {
                    content.classList.toggle('open');
                    content.style.display = content.classList.contains('open') ? 'flex' : 'none';
                    if (arrow) arrow.classList.toggle('open');
                } else if (content.classList.contains('section-content')) {
                    content.classList.toggle('open');
                    content.style.display = content.classList.contains('open') ? 'block' : 'none';
                    if (arrow) arrow.classList.toggle('open');
                }
            }
        }

        // =================================================================
        // ২. চেকবক্স ভ্যালু
        // =================================================================
        function getCheckedValues(name) {
            const checked = document.querySelectorAll('input[name="' + name + '"]:checked');
            return Array.from(checked).map(cb => cb.value).join(', ');
        }

        // =================================================================
        // ৩. প্রম্পট জেনারেট
        // =================================================================
        function generateSymptomPrompt() {
            const patientInfo = document.querySelector('textarea[name="pationtinfo"]')?.value || '';
            const diseaseDesc = document.querySelector('textarea[name="diseaseDescription"]')?.value || '';

            let promptText = `আমি একজন অভিজ্ঞ হোমিওপ্যাথিক চিকিৎসক। আমার রোগীর লক্ষণসমূহ বিশ্লেষণ করে তোমাকে দিচ্ছি, তুমি লক্ষণ যাচাই করে হোমিওপ্যাথিক রেপার্টরি (Boericke, Kent, Allen, Phatak, Murphy ইত্যাদি) এবং ম্যাটেরিয়া মেডিকা অনুসারে সঠিক ঔষধ নির্বাচন করবেন। এমন কোনো ঔষধ নির্বাচন করবেন না যা পরস্পরের ক্রিয়া নাশক (Antidote), শত্রুভাবাপন্ন (Inimical) বা রোগ বৃদ্ধিকারক।`;

            let symptoms = '';
            if (diseaseDesc) symptoms += `রোগের বর্ণনা: ${diseaseDesc}\n`;
            if (patientInfo) symptoms += `রোগীর তথ্য: ${patientInfo}\n`;

            const checkboxNames = [
                { name: 'startedWhen', label: 'রোগ শুরুর সময়কাল' },
                { name: 'feverCause', label: 'জ্বরের কারণ' },
                { name: 'feverHeatChill', label: 'উত্তাপ/শীত/কাঁপুনির পর্যায়' },
                { name: 'feverSweat', label: 'ঘাম পর্যায়' },
                { name: 'feverPain', label: 'ব্যথা ও শরীর কামরা-কামরি' },
                { name: 'feverThirst', label: 'তৃষ্ণা ও পানির ইচ্ছা' },
                { name: 'feverTiming', label: 'সময়ভেদে জ্বরের ধরন' },
                { name: 'feverGeneral', label: 'শরীরের সাধারণ অনুভূতি' },
                { name: 'feverMental', label: 'মানসিক অবস্থা' },
                { name: 'feverBefore', label: 'জ্বর আসার আগের লক্ষণ' },
                { name: 'feverAfter', label: 'জ্বর কমার পরের লক্ষণ' },
                { name: 'coldSymptoms', label: 'সর্দির অন্যান্য লক্ষণ' },
                { name: 'coldSymptoms1', label: 'সর্দি শুরুর কারণ' },
                { name: 'coldSymptoms2', label: 'সর্দির ধরন' },
                { name: 'coldSymptoms3', label: 'নাক বন্ধ/খোলা ও অনুভূতি' },
                { name: 'coldSymptoms4', label: 'হাঁচি ও গন্ধ/স্বাদের পরিবর্তন' },
                { name: 'coldSymptoms5', label: 'চোখ ও গলার অবস্থা' },
                { name: 'coldSymptoms6', label: 'মাথার উপসর্গ' },
                { name: 'coldSymptoms7', label: 'অতীত ইতিহাস' },
                { name: 'coughStart', label: 'কাশি শুরুর ও সময়কাল' },
                { name: 'coughSymptoms', label: 'কাশির প্রকৃতি ও সাউন্ড' },
                { name: 'coughSymptoms2', label: 'কাশি বাড়ায়/কমায়' },
                { name: 'coughSymptoms3', label: 'কফ সম্পর্কিত' },
                { name: 'coughSymptoms4', label: 'গলার লক্ষণ ও শ্বাসপ্রশ্বাস' },
                { name: 'coughSymptoms5', label: 'বুকের অনুভূতি' },
                { name: 'coughSymptoms6', label: 'অন্যান্য সহ-লক্ষণ' },
                { name: 'coughSymptoms7', label: 'বাচ্চাদের জন্য অতিরিক্ত লক্ষণ' },
                { name: 'aggravationFactors', label: 'রোগ বৃদ্ধির কারণ ও সময়' },
                { name: 'aggravationdeasis', label: 'রোগ উপশমের কারণ ও সময়' },
                { name: 'diseaseSelection', label: 'রোগীর অন্যান্য রোগ' },
                { name: 'olddisease', label: 'অতীতে বড় রোগ' },
                { name: 'relativesdisease', label: 'আত্মীয়দের রোগ' },
                { name: 'diseaseLocationSpread', label: 'রোগের অবস্থান' },
                { name: 'tongue', label: 'পিপাসা, জিহবা ও মুখের লক্ষণ' },
                { name: 'sweat', label: 'ঘাম সম্পর্কিত লক্ষণ' },
                { name: 'sleep', label: 'ঘুম সম্পর্কিত লক্ষণ' },
                { name: 'stomach', label: 'পাকস্থলি সম্পর্কিত লক্ষণ' },
                { name: 'food', label: 'খাবার সম্পর্কিত লক্ষণ' },
                { name: 'stool', label: 'পায়খানা সম্পর্কিত লক্ষণ' },
                { name: 'urine', label: 'প্রসাব সম্পর্কিত লক্ষণ' },
                { name: 'anger', label: 'রাগ সম্পর্কিত লক্ষণ' },
                { name: 'stress', label: 'টেনশন সম্পর্কিত লক্ষণ' },
                { name: 'fear', label: 'ভয় সম্পর্কিত লক্ষণ' },
                { name: 'dreams', label: 'স্বপ্ন সম্পর্কিত লক্ষণ' },
                { name: 'memoryspeech', label: 'স্মৃতি ও কথা বলার ভঙ্গিমা' },
                { name: 'bathtemperaturesocial', label: 'গোসল, তাপমাত্রা ও সামাজিক' },
                { name: 'body_type', label: 'লিঙ্গ, শারীরিক গঠন ও মায়াজম' }
            ];

            checkboxNames.forEach(item => {
                const values = getCheckedValues(item.name);
                if (values) symptoms += `${item.label}: ${values}\n`;
            });

            if (symptoms) {
                promptText += `রোগীর লক্ষণসমূহ:\n${symptoms}\n\n`;
            } else {
                promptText += `রোগীর লক্ষণসমূহ: (কোনো লক্ষণ সিলেক্ট করা হয়নি)\n\n`;
            }

            promptText += `নির্দেশনা:
        রোগীর লক্ষণসমূহ বিস্তারিতভাবে যাচাই করে নিম্নোক্ত কাঠামোয় একটি প্রেসক্রিপশন তৈরি করুন। প্রেসক্রিপশন এর ভিতরে ঔষধ সিলেকশনের কারন লিখ না।
        প্রেসক্রিপশন ফরম্যাট: ... (আপনার পুরো নির্দেশনা এখানে দিন) ...`;

            return promptText;
        }

        // =================================================================
        // ৪. ফলাফল দেখানো
        // =================================================================
        function displayResult() {
            const resultDiv = document.getElementById('result');
            if (!resultDiv) return;
            const promptText = generateSymptomPrompt();
            resultDiv.innerHTML = `<h5>📋 রোগী বিশ্লেষণ প্রম্পট</h5><p style="white-space:pre-wrap;">${promptText}</p>`;
        }

        // =================================================================
        // ৫. প্রম্পট কপি
        // =================================================================
        function copyResult() {
            const resultDiv = document.getElementById('result');
            if (!resultDiv) { alert('ফলাফল বক্স পাওয়া যায়নি!'); return; }
            const text = resultDiv.innerText;
            if (!text || text.trim() === '') { alert('প্রথমে "জেনারেট করুন" বাটনে ক্লিক করুন।'); return; }
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text)
                    .then(() => alert('✅ কপি হয়েছে!'))
                    .catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-9999px';
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                alert('✅ কপি হয়েছে!');
            } catch (err) {
                alert('❌ কপি করা সম্ভব হয়নি। ম্যানুয়ালি কপি করুন।');
            }
            document.body.removeChild(textArea);
        }

        // =================================================================
        // ৬. AI টুলস ফাংশন
        // =================================================================
        function openGemini() { window.open('https://gemini.google.com/', '_blank'); }
        function openChatGPT() { window.open('https://chat.openai.com/', '_blank'); }
        function openGrok() { window.open('https://grok.com/', '_blank'); }
        function openDeepSeek() { window.open('https://chat.deepseek.com/', '_blank'); }
        function openPerplexity() {
            const resultDiv = document.getElementById('result');
            if (!resultDiv) { alert('ফলাফল বক্স পাওয়া যায়নি!'); return; }
            const text = resultDiv.innerText;
            if (!text || text.trim() === '') { alert('প্রথমে প্রম্পট তৈরি করুন।'); return; }
            const encoded = encodeURIComponent(text);
            window.open('https://www.perplexity.ai/?q=' + encoded, '_blank');
        }
        function openPrescription() {
            const resultDiv = document.getElementById('result');
            if (!resultDiv) { alert('ফলাফল বক্স পাওয়া যায়নি!'); return; }
            const text = resultDiv.innerText;
            if (!text || text.trim() === '') { alert('প্রথমে প্রম্পট তৈরি করুন।'); return; }
            const encoded = encodeURIComponent(text);
            window.open('https://keep.google.com/#NEW/' + encoded, '_blank');
        }

        // =================================================================
        // ৭. বাটন তৈরি করা (ডায়নামিক)
        // =================================================================
        function createButtons() {
            const container = document.getElementById('button-container');
            if (!container) return;

            const buttons = [
                { id: 'generateBtn', class: 'btn btn-primary', icon: '📋', text: 'জেনারেট করুন', type: 'submit' },
                { id: 'copyPromptBtn', class: 'btn btn-copy', icon: '📋', text: 'কপি', type: 'button', action: copyResult },
                { id: 'geminiBtn', class: 'btn btn-gemini', icon: '🌟', text: 'Gemini', type: 'button', action: openGemini },
                { id: 'chatgptBtn', class: 'btn btn-chatgpt', icon: '🤖', text: 'ChatGPT', type: 'button', action: openChatGPT },
                { id: 'grokBtn', class: 'btn btn-grok', icon: '⚡', text: 'Grok', type: 'button', action: openGrok },
                { id: 'deepseekBtn', class: 'btn btn-deepseek', icon: '🔍', text: 'DeepSeek', type: 'button', action: openDeepSeek },
                { id: 'perplexityBtn', class: 'btn btn-perplexity', icon: '🔬', text: 'Perplexity', type: 'button', action: openPerplexity },
                { id: 'prescriptionBtn', class: 'btn btn-pink', icon: '💊', text: 'প্রেসক্রিপশন', type: 'button', action: openPrescription }
            ];

            const buttonGroup = document.createElement('div');
            buttonGroup.className = 'button-group';

            buttons.forEach(btnData => {
                const btn = document.createElement('button');
                btn.id = btnData.id;
                btn.className = btnData.class;
                btn.type = btnData.type || 'button';
                btn.innerHTML = `${btnData.icon} ${btnData.text}`;
                if (btnData.type === 'submit') {
                    btn.addEventListener('click', function(e) {
                        e.preventDefault();
                        displayResult();
                    });
                } else if (btnData.action) {
                    btn.addEventListener('click', btnData.action);
                }
                buttonGroup.appendChild(btn);
            });

            container.appendChild(buttonGroup);
        }

        // =================================================================
        // ৮. হেডার-ফুটার লোড
        // =================================================================
        function loadHeaderFooter() {
            // হেডার লোড
            $('#header-placeholder').load('assets/header.html', function(response, status, xhr) {
                if (status === 'error') {
                    console.warn('হেডার লোড করতে সমস্যা:', xhr.status, xhr.statusText);
                    // ব্যাকআপ: হেডার দেখানোর জন্য একটি ডিফল্ট HTML
                    $('#header-placeholder').html('<header style="background:#00b8a9; padding:10px; color:white; text-align:center;">হেডার লোড করা সম্ভব হয়নি</header>');
                } else {
                    // মোবাইল মেনু সক্রিয় (যদি থাকে)
                    const btn = document.getElementById('mobile-menu-btn');
                    const menu = document.getElementById('mobile-menu');
                    if (btn && menu) {
                        btn.addEventListener('click', function() {
                            menu.classList.toggle('hidden');
                            btn.innerHTML = menu.classList.contains('hidden') ? '<i class="fas fa-bars"></i>' : '<i class="fas fa-times"></i>';
                        });
                    }
                }
            });

            // ফুটার লোড
            $('#footer-placeholder').load('assets/footer.html', function(response, status, xhr) {
                if (status === 'error') {
                    console.warn('ফুটার লোড করতে সমস্যা:', xhr.status, xhr.statusText);
                    $('#footer-placeholder').html('<footer style="background:#0d5c3a; padding:10px; color:white; text-align:center;">ফুটার লোড করা সম্ভব হয়নি</footer>');
                }
            });
        }

        // =================================================================
        // ৯. ডোম রেডি হলে সব সেটআপ
        // =================================================================
        document.addEventListener('DOMContentLoaded', function() {
            // সব চেকবক্স গ্রুপ ও সেকশন কন্টেন্ট ডিফল্ট বন্ধ
            document.querySelectorAll('.checkbox-group').forEach(g => {
                g.classList.remove('open');
                g.style.display = 'none';
            });
            document.querySelectorAll('.section-content').forEach(c => {
                c.classList.remove('open');
                c.style.display = 'none';
            });

            // ফর্ম সাবমিট (যদি ফর্ম থাকে)
            const form = document.getElementById('symptomForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    displayResult();
                });
            }

            // বাটন তৈরি
            createButtons();

            // হেডার-ফুটার লোড
            loadHeaderFooter();

            // কপি প্রটেকশন (ইভেন্ট)
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey || e.metaKey) {
                    const key = e.key.toLowerCase();
                    if (['c', 'a', 'u', 's', 'p'].includes(key)) {
                        e.preventDefault();
                    }
                }
                if (e.key === 'F12') e.preventDefault();
            });
            document.addEventListener('selectstart', function(e) {
                const tag = e.target.tagName.toLowerCase();
                if (tag !== 'textarea' && tag !== 'input') e.preventDefault();
            });

            console.log('✅ সব ফাংশনালিটি সক্রিয় হয়েছে!');
        });
    </script>

</body>
