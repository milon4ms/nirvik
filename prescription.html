<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রেসক্রিপশন - নির্বিক হোমিও</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>

    <script>
        const style = document.createElement('style');
        style.innerHTML = 'body { display: none !important; }';
        document.head.appendChild(style);

        let currentUserId = null;

        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                currentUserId = user.uid;
                if (style.parentNode) style.remove();
                loadPrescriptions(user.uid);
            }
        });
    </script>
    <style>
        body { 
            font-family: 'SolaimanLipi', system-ui, sans-serif; 
            background: #f8fafc; 
            min-height: 100vh;
            color: #0f172a;
        }
        #header-placeholder {
            background-color: #0f172a !important;
            display: block;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="mb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4 bg-gradient-to-r from-emerald-800 to-teal-900 p-6 rounded-2xl text-white shadow-sm">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2 text-emerald-300">
                    <i class="fas fa-file-prescription"></i> ডিজিটাল প্রেসক্রিপশন
                </h1>
                <p class="text-xs text-emerald-100/80 mt-1">আপনার তৈরি করা এআই প্রেসক্রিপশনগুলো সুরক্ষিতভাবে ১০ লক্ষ ফ্রি মেমরির ডাটাবেজে সংরক্ষণ করুন।</p>
            </div>
            <a href="dashboard.html" class="bg-white/10 hover:bg-white/20 text-white text-xs font-bold px-4 py-2 rounded-xl transition inline-flex items-center gap-1.5 self-start md:self-auto">
                <i class="fas fa-arrow-left"></i> ড্যাশবোর্ডে ফিরুন
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            <div class="lg:col-span-5 bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4">
                <h2 class="text-sm font-bold text-slate-800 border-b border-slate-100 pb-2 flex items-center gap-1.5">
                    <i class="fas fa-plus-circle text-emerald-500"></i> নতুন প্রেসক্রিপশন যুক্ত করুন
                </h2>
                
                <form id="prescriptionForm" class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-1">রোগীর নাম *</label>
                        <input type="text" id="patientName" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs focus:outline-emerald-500 focus:bg-white transition" placeholder="উদা: আব্দুল করিম">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-1">রোগীর মোবাইল বা রোগের নাম</label>
                        <input type="text" id="patientInfo" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs focus:outline-emerald-500 focus:bg-white transition" placeholder="উদা: 017XXXXXXXX / দীর্ঘস্থায়ী হাঁপানি">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-1">এআই জেনারেটেড প্রেসক্রিপশন টেক্সট *</label>
                        <textarea id="prescriptionText" required rows="10" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs focus:outline-emerald-500 focus:bg-white font-mono transition" placeholder="AI চ্যাটবট থেকে প্রাপ্ত সম্পূর্ণ প্রেসক্রিপশনটি এখানে পেস্ট (Paste) করুন..."></textarea>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs py-2.5 rounded-lg shadow transition flex items-center justify-center gap-1.5">
                        <i class="fas fa-save"></i> ডাটাবেজে ক্লাউড সেভ করুন
                    </button>
                </form>
            </div>

            <div class="lg:col-span-7 bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4">
                <h2 class="text-sm font-bold text-slate-800 border-b border-slate-100 pb-2 flex items-center gap-1.5">
                    <i class="fas fa-list-ul text-emerald-500"></i> আপনার সংরক্ষিত প্রেসক্রিপশনসমূহ
                </h2>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-xs">
                        <thead>
                            <tr class="bg-slate-50 text-slate-700 uppercase font-bold border-b border-slate-200">
                                <th class="p-3">তারিখ</th>
                                <th class="p-3">রোগীর নাম</th>
                                <th class="p-3">মোবাইল/রোগ</th>
                                <th class="p-3 text-center">প্রেসক্রিপশন</th>
                            </tr>
                        </thead>
                        <tbody id="prescriptionTableBody" class="text-slate-600 divide-y divide-slate-100">
                            <tr>
                                <td colspan="4" class="p-6 text-center text-slate-400">লোড হচ্ছে...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="textModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-lg w-full p-5 shadow-xl flex flex-col max-h-[80vh]">
            <div class="flex items-center justify-between border-b pb-2 mb-3">
                <h3 class="font-bold text-slate-800 text-sm flex items-center gap-1">
                    <i class="fas fa-file-invoice text-emerald-500"></i> প্রেসক্রিপশন ভিউ
                </h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-sm">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="overflow-y-auto bg-slate-50 p-3 rounded-lg border text-xs text-slate-700 font-mono whitespace-pre-wrap flex-1" id="modalTextContent">
                </div>
            <div class="mt-4 flex justify-end">
                <button onclick="closeModal()" class="bg-slate-800 hover:bg-slate-700 text-white font-bold text-xs px-4 py-1.5 rounded-lg transition">বন্ধ করুন</button>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        $(function() {
            $('#header-placeholder').load('assets/header.html');
            $('#footer-placeholder').load('assets/footer.html');
        });

        function formatDateToBangla(dateString) {
            if (!dateString) return dateString;
            const date = new Date(dateString);
            if (isNaN(date)) return dateString;
            return date.toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        // ফর্ম সাবমিট করে Firestore-এ ডাটা সেভ করার লজিক
        $('#prescriptionForm').on('submit', function(e) {
            e.preventDefault();
            if(!currentUserId) return alert("ত্রুটি: পুনরায় লগইন করুন।");

            const patientName = $('#patientName').val();
            const patientInfo = $('#patientInfo').val() || 'prefix_not_set';
            const prescriptionText = $('#prescriptionText').val();

            const submitBtn = $(this).find('button[type="submit"]');
            submitBtn.prop('disabled', true).text('সংরক্ষণ হচ্ছে...');

            firebase.firestore().collection("prescriptions").add({
                doctorId: currentUserId,
                patientName: patientName,
                patientInfo: patientInfo,
                prescriptionText: prescriptionText,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert("প্রেসক্রিপশনটি সফলভাবে আর্কাইভে সংরক্ষিত হয়েছে!");
                $('#prescriptionForm')[0].reset();
            }).catch(error => {
                console.error("Error: ", error);
                alert("ডাটা সেভ করতে ব্যর্থ হয়েছে।");
            }).finally(() => {
                submitBtn.prop('disabled', false).html('<i class="fas fa-save"></i> ডাটাবেজে ক্লাউড সেভ করুন');
            });
        });

        // রিয়েলটাইমে ফায়ারস্টোর থেকে ইউজারের নিজস্ব প্রেসক্রিপশন ডাটা রিড করা
        function loadPrescriptions(uid) {
            firebase.firestore().collection("prescriptions")
                .where("doctorId", "==", uid)
                .orderBy("createdAt", "desc")
                .onSnapshot((querySnapshot) => {
                    const tbody = document.getElementById('prescriptionTableBody');
                    tbody.innerHTML = '';

                    if (querySnapshot.empty) {
                        tbody.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-slate-400">কোনো সংরক্ষিত প্রেসক্রিপশন রেকর্ড খুঁজে পাওয়া যায়নি।</td></tr>`;
                        return;
                    }

                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        let dateStr = 'প্রক্রিয়াধীন';
                        if(data.createdAt) {
                            dateStr = formatDateToBangla(data.createdAt.toDate().toISOString().split('T')[0]);
                        }

                        // মডার্ন পপআপ মোডালের মাধ্যমে ডাটা ভিউ করার বাটন
                        const viewBtnHtml = `<button onclick="openModal(\`${escape(data.prescriptionText)}\`)" class="bg-emerald-50 text-emerald-600 hover:bg-emerald-100 font-bold px-2.5 py-1 rounded-lg text-[11px] inline-flex items-center gap-1 transition"><i class="fas fa-eye text-[10px]"></i> দেখুন</button>`;

                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-slate-50 transition border-b border-slate-100";
                        tr.innerHTML = `
                            <td class="p-3 whitespace-nowrap text-slate-500">${dateStr}</td>
                            <td class="p-3 font-bold text-slate-800">${data.patientName}</td>
                            <td class="p-3 text-slate-500">${data.patientInfo}</td>
                            <td class="p-3 text-center">${viewBtnHtml}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }, (error) => {
                    console.error("Error loading prescriptions: ", error);
                });
        }

        // মোডাল পপআপ স্ক্রিপ্ট
        function openModal(escapedText) {
            document.getElementById('modalTextContent').textContent = unescape(escapedText);
            const modal = document.getElementById('textModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('textModal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }
    </script>
</body>
</html>
